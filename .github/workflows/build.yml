name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # permite rodar manualmente pela aba Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Compilar com PyInstaller
        run: pyinstaller --onefile --windowed --name OrganizadorApp main.py

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: OrganizadorApp-windows
          path: dist/Main_.exe
